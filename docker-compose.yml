version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: detailx
      POSTGRES_USER: detailx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-detailx_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detailx -d detailx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://detailx:${POSTGRES_PASSWORD:-detailx_secret}@postgres:5432/detailx
      REDIS_URL: redis://redis:6379
      PHONEPE_CLIENT_ID: ${PHONEPE_CLIENT_ID}
      PHONEPE_CLIENT_SECRET: ${PHONEPE_CLIENT_SECRET}
      PHONEPE_CLIENT_VERSION: ${PHONEPE_CLIENT_VERSION:-1}
      PHONEPE_ENV: ${PHONEPE_ENV:-SANDBOX}
      PHONEPE_REDIRECT_URL: ${PHONEPE_REDIRECT_URL}
      PHONEPE_CALLBACK_URL: ${PHONEPE_CALLBACK_URL}
      GUPSHUP_API_KEY: ${GUPSHUP_API_KEY}
      GUPSHUP_APP_NAME: ${GUPSHUP_APP_NAME}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STUDIO_ADDRESS: ${STUDIO_ADDRESS:-DetailX Studio, Kochi, Kerala}
      STUDIO_PHONE: ${STUDIO_PHONE:-+91 98765 43210}
      STUDIO_WHATSAPP: ${STUDIO_WHATSAPP:-919876543210}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
      NEXT_PUBLIC_STUDIO_PHONE: ${STUDIO_PHONE:-+91 98765 43210}
      NEXT_PUBLIC_STUDIO_WHATSAPP: ${STUDIO_WHATSAPP:-919876543210}
      NEXT_PUBLIC_STUDIO_ADDRESS: ${STUDIO_ADDRESS:-DetailX Studio, Kochi, Kerala}
      NODE_ENV: production
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
